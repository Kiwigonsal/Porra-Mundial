<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1410">
<meta name="description" content="La porra del Mundial 2026 entre amigos. Pronostica, suma puntos y pelea por la cima de la tabla.">
<title>La Porra del Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --campo:#0B1410;          /* noche de estadio */
    --campo-2:#101D16;        /* tarjeta */
    --campo-3:#16271D;        /* tarjeta elevada */
    --cal:#F2F5F0;            /* línea de cal */
    --cal-suave:rgba(242,245,240,.55);
    --cal-tenue:rgba(242,245,240,.14);
    --cesped:#27A05D;         /* verde césped bajo focos */
    --trofeo:#E8B23A;         /* dorado */
    --tarjeta-roja:#E25445;   /* estado en vivo */
    --grada:#8A9690;          /* texto secundario */
    --radius:14px;
    --display:'Anton', Impact, sans-serif;
    --body:'Inter', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body); background:var(--campo); color:var(--cal);
    min-height:100dvh;
    background-image:
      radial-gradient(1200px 500px at 50% -200px, rgba(39,160,93,.18), transparent 70%),
      repeating-linear-gradient(90deg, transparent 0 72px, rgba(242,245,240,.018) 72px 144px);
  }
  #app{max-width:560px; margin:0 auto; padding:0 14px calc(86px + env(safe-area-inset-bottom)); }

  /* ---------- Cabecera ---------- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 2px 14px; gap:10px;
  }
  .marca{display:flex; flex-direction:column; line-height:1}
  .marca .anyo{font-family:var(--display); font-size:13px; letter-spacing:.35em; color:var(--trofeo); text-transform:uppercase}
  .marca h1{font-family:var(--display); font-size:clamp(26px,7vw,34px); letter-spacing:.02em; font-weight:400; text-transform:uppercase}
  .yo{
    display:flex; align-items:center; gap:8px; background:var(--campo-2);
    border:1px solid var(--cal-tenue); border-radius:999px; padding:7px 13px 7px 9px;
    font-size:13px; font-weight:600; color:var(--cal); cursor:pointer;
  }
  .yo .pts{font-family:var(--display); color:var(--trofeo); font-size:15px; letter-spacing:.05em}

  /* ---------- Tarjetas de partido (el videomarcador) ---------- */
  .dia-titulo{
    font-size:11px; font-weight:800; letter-spacing:.2em; text-transform:uppercase;
    color:var(--grada); margin:22px 4px 10px; display:flex; align-items:center; gap:10px;
  }
  .dia-titulo::after{content:""; flex:1; height:1px; background:var(--cal-tenue)}
  .partido{
    background:linear-gradient(180deg, var(--campo-3), var(--campo-2));
    border:1px solid var(--cal-tenue); border-radius:var(--radius);
    padding:14px 14px 12px; margin-bottom:12px; position:relative; overflow:hidden;
  }
  .partido::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--cal-tenue); }
  .partido.en-vivo::before{background:var(--tarjeta-roja)}
  .partido.acabado::before{background:var(--cesped)}
  .partido-meta{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; color:var(--grada); margin-bottom:10px; letter-spacing:.04em;
  }
  .chip{
    font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    padding:3px 9px; border-radius:999px; border:1px solid var(--cal-tenue); color:var(--grada);
  }
  .chip.vivo{color:#fff; background:var(--tarjeta-roja); border-color:var(--tarjeta-roja)}
  .chip.vivo::before{content:"●"; margin-right:5px; animation:lat 1.1s infinite}
  .chip.fin{color:var(--campo); background:var(--cesped); border-color:var(--cesped)}
  @keyframes lat{50%{opacity:.25}}
  @media (prefers-reduced-motion: reduce){ .chip.vivo::before{animation:none} }

  .marcador{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px}
  .equipo{display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0}
  .equipo img{width:42px; height:42px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  .equipo .sin-escudo{width:42px;height:42px;border-radius:50%;background:var(--campo);border:1px dashed var(--cal-tenue);display:flex;align-items:center;justify-content:center;font-size:18px}
  .equipo span{font-size:12.5px; font-weight:600; text-align:center; line-height:1.2; overflow-wrap:anywhere}
  .tanteo{
    font-family:var(--display); font-size:40px; letter-spacing:.06em; text-align:center;
    min-width:96px; font-variant-numeric:tabular-nums; line-height:1;
  }
  .tanteo small{display:block; font-family:var(--body); font-size:10px; letter-spacing:.18em; color:var(--grada); margin-top:4px; text-transform:uppercase}
  .tanteo .vs{color:var(--cal-suave); font-size:22px}

  /* ---------- Pronóstico ---------- */
  .pron{ margin-top:12px; padding-top:12px; border-top:1px dashed var(--cal-tenue); }
  .pron-titulo{font-size:10px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--trofeo); margin-bottom:8px}
  .pron-fila{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px}
  .stepper{display:flex; align-items:center; justify-content:center; gap:8px}
  .stepper button{
    width:42px; height:42px; border-radius:12px; border:1px solid var(--cal-tenue);
    background:var(--campo); color:var(--cal); font-size:20px; font-weight:800; cursor:pointer;
    touch-action:manipulation;
  }
  .stepper button:active{background:var(--campo-3)}
  .stepper .num{font-family:var(--display); font-size:30px; min-width:34px; text-align:center; font-variant-numeric:tabular-nums}
  .guardar{
    margin-top:10px; width:100%; padding:12px; border-radius:12px; border:0; cursor:pointer;
    background:var(--trofeo); color:#241a05; font-weight:800; font-size:14px; letter-spacing:.04em;
    font-family:var(--body);
  }
  .guardar[disabled]{opacity:.55; cursor:default}
  .guardado-ok{color:var(--cesped); font-size:12px; font-weight:600; margin-top:8px; text-align:center}

  .picks{margin-top:12px; padding-top:10px; border-top:1px dashed var(--cal-tenue); display:flex; flex-wrap:wrap; gap:6px}
  .pick{
    display:flex; align-items:center; gap:6px; font-size:12px; padding:5px 10px;
    background:var(--campo); border:1px solid var(--cal-tenue); border-radius:999px; color:var(--cal-suave);
  }
  .pick b{color:var(--cal); font-variant-numeric:tabular-nums}
  .pick .p5{color:var(--trofeo); font-weight:800}
  .pick .p4{color:#b3e6c9; font-weight:800}
  .pick .p3{color:var(--cesped); font-weight:800}
  .pick .p1{color:var(--cal-suave); font-weight:800}
  .pick .p0{color:var(--grada)}
  .pick.vivo-verde { border-color: var(--cesped); background: rgba(39,160,93,.15); }
  .pick.vivo-rojo { border-color: var(--tarjeta-roja); background: rgba(226,84,69,.15); opacity: 0.8; }
  .candado{font-size:11.5px; color:var(--grada); margin-top:10px; text-align:center}

  /* ---------- Tabla de Clasificación: Podio y Ranking ---------- */
  .live-banner { background: rgba(226,84,69,.15); color: var(--tarjeta-roja); text-align: center; font-size: 11px; font-weight: 800; padding: 8px; border-radius: 8px; text-transform: uppercase; margin-bottom: 16px; letter-spacing: .05em; animation: lat 1.5s infinite; }
  .podio-container { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin: 24px 0; }
  .podio-item { display: flex; flex-direction: column; align-items: center; background: var(--campo-2); border-radius: 16px 16px 0 0; padding: 15px 10px; width: 31%; position: relative; }
  .podio-item.oro { background: linear-gradient(180deg, rgba(232,178,58,0.2) 0%, var(--campo-2) 100%); border: 1px solid var(--trofeo); border-bottom: none; z-index: 2; padding-bottom: 25px; }
  .podio-item.plata { background: linear-gradient(180deg, rgba(192,192,192,0.15) 0%, var(--campo-2) 100%); border: 1px solid #C0C0C0; border-bottom: none; height: 90%; }
  .podio-item.bronce { background: linear-gradient(180deg, rgba(205,127,50,0.15) 0%, var(--campo-2) 100%); border: 1px solid #CD7F32; border-bottom: none; height: 80%; }
  .podio-avatar { width: 50px; height: 50px; border-radius: 50%; font-size: 30px; display: flex; align-items: center; justify-content: center; background: var(--campo); border: 2px solid; margin-bottom: 8px;}
  .podio-item.oro .podio-avatar { border-color: var(--trofeo); width: 64px; height: 64px; font-size: 35px; }
  .podio-item.plata .podio-avatar { border-color: #C0C0C0; }
  .podio-item.bronce .podio-avatar { border-color: #CD7F32; }
  .podio-nombre { font-size: 13px; font-weight: 800; text-align: center; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; margin-bottom: 4px; }
  .podio-pts { font-family: var(--display); font-size: 22px; color: var(--cal); line-height: 1; }
  .podio-pts small { font-size: 10px; font-family: var(--body); color: var(--grada); font-weight: 800; text-transform: uppercase; margin-left: 2px; }
  .medalla { position: absolute; top: -14px; font-size: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

  .lista-ranking { display: flex; flex-direction: column; gap: 10px; }
  .rank-card { display: flex; align-items: center; background: var(--campo-2); border: 1px solid var(--cal-tenue); border-radius: 16px; padding: 12px 14px; gap: 12px; }
  .rank-card.yo { border-color: var(--cesped); background: rgba(39,160,93,0.05); }
  .rank-pos { display: flex; flex-direction: column; align-items: center; min-width: 28px; }
  .rank-num { font-family: var(--display); font-size: 18px; color: var(--cal); line-height:1; }
  .rank-trend { font-size: 10px; font-weight: 800; margin-top: 4px; line-height:1; }
  .trend-up { color: var(--cesped); }
  .trend-down { color: var(--tarjeta-roja); }
  .trend-eq { color: var(--grada); }
  .rank-avatar { width: 44px; height: 44px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; background: var(--campo); border: 1px solid var(--cal-tenue); flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-nombre { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .rank-stats { font-size: 11px; color: var(--grada); display: flex; gap: 8px; font-weight: 600; }
  .rank-stats span { display: flex; align-items: center; gap: 3px; }
  .rank-pts-box { background: var(--campo); border: 1px solid var(--cal-tenue); border-radius: 12px; padding: 8px 10px; display: flex; flex-direction: column; align-items: center; min-width: 55px; justify-content: center;}
  .rank-pts-val { font-family: var(--display); font-size: 20px; color: var(--cal); line-height: 1; }
  .rank-pts-lbl { font-size: 9px; font-weight: 800; color: var(--grada); letter-spacing: .1em; margin-top: 2px; }
  .rank-pts-box.has-trend { position: relative; }
  .rank-pts-trend { font-size: 10px; color: var(--cesped); font-weight: 800; margin-top: 2px; line-height: 1;}

  /* ---------- Perfil UI ---------- */
  .perfil-header { background: linear-gradient(180deg, var(--campo-3), var(--campo-2)); border: 1px solid var(--cal-tenue); border-radius: var(--radius); padding: 30px 14px 20px; text-align: center; margin-bottom: 14px; position: relative; overflow: hidden; }
  .perfil-header::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; background:var(--trofeo); }
  .perfil-avatar { width: 70px; height: 70px; background: var(--campo); border: 2px solid var(--cal-tenue); border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
  .perfil-header h2 { font-family: var(--display); font-size: 26px; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 12px; }
  .perfil-badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; letter-spacing: .05em; }
  .badge-pos { background: rgba(232,178,58,0.15); border: 1px solid var(--trofeo); color: var(--trofeo); }
  .badge-jugados { background: rgba(242,245,240,0.1); border: 1px solid var(--cal-tenue); color: var(--cal); }
  .badge-podio { background: rgba(39,160,93,0.15); border: 1px solid var(--cesped); color: var(--cesped); }

  .perfil-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .p-stat-card { background: var(--campo-2); border: 1px solid var(--cal-tenue); border-radius: 12px; padding: 16px 6px; text-align: center; }
  .p-stat-card .v { font-family: var(--display); font-size: 24px; margin-bottom: 4px; }
  .p-stat-card .k { font-size: 9px; font-weight: 800; color: var(--grada); letter-spacing: .1em; text-transform: uppercase; }

  .perfil-dash-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; margin-bottom: 24px; }
  .p-dash-card { background: var(--campo-2); border: 1px solid var(--cal-tenue); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; justify-content: center; }
  .efi-card { align-items: center; }
  .efi-circle { width: 66px; height: 66px; border-radius: 50%; border: 5px solid var(--trofeo); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-family: var(--display); font-size: 18px; color: var(--cal); border-left-color: var(--cal-tenue); transform: rotate(-45deg); }
  .efi-circle span { transform: rotate(45deg); }
  .forma-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .forma-box { width: 24px; height: 24px; border-radius: 6px; }
  .forma-verde { background: var(--cesped); }
  .forma-roja { background: var(--tarjeta-roja); }
  .forma-vacia { background: var(--campo); border: 1px dashed var(--cal-tenue); }
  .forma-txt { font-size: 12px; color: var(--cal); font-weight: 600; }

  .seccion-titulo { font-size: 11px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; color: var(--grada); margin-bottom: 12px; display:flex; align-items:center; gap:8px;}
  .seccion-titulo::after { content:""; flex:1; height:1px; background:var(--cal-tenue); }
  
  .pron-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px;}
  .pron-item { background: var(--campo-2); border: 1px solid var(--cal-tenue); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; }
  .pron-item-eq { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--cal-suave); font-weight: 800; width:65px; justify-content:center; flex-shrink:0; }
  .pron-item-eq img, .pron-item-eq .sin-escudo { width: 22px; height: 22px; font-size: 10px; }
  .pron-item-info { flex: 1; min-width: 0; border-left:1px dashed var(--cal-tenue); padding-left:10px; }
  .pron-item-nombres { font-size: 11.5px; color: var(--grada); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; font-weight:600;}
  .pron-item-scores { font-size: 12px; color: var(--cal-suave); }
  .pron-item-pts { font-family: var(--display); font-size: 20px; color: var(--cal-suave); min-width: 30px; text-align: right; }
  .pron-item-pts.ok { color: var(--trofeo); }
  .pron-item-pts.vivo { font-family: var(--body); font-size: 11px; color: var(--tarjeta-roja); font-weight: 800; text-transform: uppercase; animation: lat 1.1s infinite; text-align:right;}
  .pron-item-pts.pending { font-size:16px; color:var(--cal-tenue); }

  /* ---------- Formularios / Utils ---------- */
  .grupo-card{background:var(--campo-2); border:1px solid var(--cal-tenue); border-radius:var(--radius); padding:12px 14px; margin-bottom:12px}
  .grupo-card h3{font-family:var(--display); font-weight:400; letter-spacing:.1em; color:var(--trofeo); font-size:15px; margin-bottom:8px; text-transform:uppercase}
  .grupo-card table{width:100%; border-collapse:collapse; font-size:12.5px}
  .grupo-card td,.grupo-card th{padding:5px 4px; text-align:right; font-variant-numeric:tabular-nums}
  .grupo-card td:first-child,.grupo-card th:first-child{text-align:left}
  .grupo-card th{color:var(--grada); font-size:10px; letter-spacing:.1em; text-transform:uppercase}
  .grupo-card td{border-top:1px solid rgba(242,245,240,.06)}

  .panel{background:var(--campo-2); border:1px solid var(--cal-tenue); border-radius:var(--radius); padding:18px; margin-top:16px}
  .panel h2{font-family:var(--display); font-weight:400; letter-spacing:.05em; font-size:20px; margin-bottom:4px; text-transform:uppercase}
  .panel p{color:var(--grada); font-size:13px; margin-bottom:14px; line-height:1.5}
  label{display:block; font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--grada); margin:12px 0 6px}
  input[type=text],input[type=password],input[type=datetime-local],select{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--cal-tenue);
    background:var(--campo); color:var(--cal); font-size:16px; font-family:var(--body);
  }
  input:focus,select:focus,button:focus-visible{outline:2px solid var(--cesped); outline-offset:1px}
  .btn{
    width:100%; margin-top:14px; padding:13px; border-radius:12px; border:0; cursor:pointer;
    background:var(--cesped); color:#06130b; font-weight:800; font-size:14px;
  }
  .btn.secundario{background:transparent; border:1px solid var(--cal-tenue); color:var(--cal)}
  .btn.peligro{background:transparent; border:1px solid var(--tarjeta-roja); color:var(--tarjeta-roja)}
  .btn.oro{background:var(--trofeo); color:#241a05}
  .error{color:var(--tarjeta-roja); font-size:13px; margin-top:10px; font-weight:600}
  .ok{color:var(--cesped); font-size:13px; margin-top:10px; font-weight:600}
  .nota{color:var(--grada); font-size:12px; line-height:1.55; margin-top:12px}

  .emoji-fila{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px}
  .emoji-fila button{
    width:44px; height:44px; font-size:22px; border-radius:12px; cursor:pointer;
    background:var(--campo); border:1px solid var(--cal-tenue);
  }
  .emoji-fila button.activo{border-color:var(--trofeo); background:rgba(232,178,58,.12)}

  /* ---------- Barra de pestañas inferior ---------- */
  nav{
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    background:rgba(11,20,16,.92); backdrop-filter:blur(12px);
    border-top:1px solid var(--cal-tenue);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-inner{max-width:560px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr)}
  nav button{
    background:none; border:0; color:var(--grada); padding:10px 4px 12px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-family:var(--body);
  }
  nav button .ico{font-size:20px}
  nav button.activo{color:var(--trofeo)}

  .vacio{text-align:center; color:var(--grada); padding:40px 16px; font-size:14px; line-height:1.6}
  .cargando{text-align:center; color:var(--grada); padding:40px; font-size:13px; letter-spacing:.1em; text-transform:uppercase}

  .aviso-config{
    background:rgba(226,84,69,.1); border:1px solid var(--tarjeta-roja); border-radius:var(--radius);
    padding:16px; margin-top:16px; font-size:13.5px; line-height:1.6;
  }
  .aviso-config code{background:var(--campo); padding:2px 6px; border-radius:6px; font-size:12px}

  .admin-partido{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 0; border-bottom:1px solid rgba(242,245,240,.07); font-size:13px}
  .admin-partido .mini{display:flex; gap:6px; align-items:center}
  .admin-partido input{width:46px; padding:8px 4px; text-align:center; font-size:15px}
  .admin-partido .btn-mini{padding:8px 10px; border-radius:10px; border:1px solid var(--cal-tenue); background:var(--campo); color:var(--cal); cursor:pointer; font-size:12px; font-weight:700}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="marca">
      <span class="anyo">Mundial 2026</span>
      <h1 id="titulo-porra">La Porra</h1>
    </div>
    <button class="yo" id="btn-yo" onclick="irA('perfil')" hidden>
      <span id="yo-emoji">⚽</span><span id="yo-nombre"></span><span class="pts" id="yo-pts">0</span>
    </button>
  </header>
  <main id="vista"></main>
</div>
<nav>
  <div class="nav-inner">
    <button data-tab="partidos" onclick="irA('partidos')"><span class="ico">⚽</span>Partidos</button>
    <button data-tab="torneo" onclick="irA('torneo')"><span class="ico">🏟️</span>Torneo</button>
    <button data-tab="tabla" onclick="irA('tabla')"><span class="ico">🏆</span>Tabla</button>

async function sha256(texto){
  const data = new TextEncoder().encode(texto);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ---------- Puntos ---------- */
function puntosDe(pred, p){
  if (p.goles_local == null || p.goles_visitante == null) return null;
  
  const aciertoLocal = pred.goles_local === p.goles_local;
  const aciertoVisitante = pred.goles_visitante === p.goles_visitante;
  const aciertoSigno = Math.sign(pred.goles_local - pred.goles_visitante) === Math.sign(p.goles_local - p.goles_visitante);

  if (aciertoLocal && aciertoVisitante) return 5; // Pleno (Resultado exacto)
  if (aciertoSigno && (aciertoLocal || aciertoVisitante)) return 4; // Signo + Goles 1 equipo
  if (aciertoSigno) return 3; // Ganador o empate acertado
  
  return 0; // Fallo total (eliminado el +1 suelto)
}

function clasificacion(){
  // Calculamos la tabla histórica (sin el último partido finalizado) para sacar la Tendencia
  const terminados = partidos.filter(p => p.estado === "FINISHED").sort((a,b) => new Date(a.fecha_utc) - new Date(b.fecha_utc));
  const idUltimo = terminados.length ? terminados[terminados.length-1].id : null;

  const filas = usuarios.map(u => ({ u, total: u.puntos_extra || 0, totalAnt: u.puntos_extra || 0, plenos:0, plenosAnt:0, signos:0, jugados:0, ptsUltimo: 0 }));
  const porUsuario = Object.fromEntries(filas.map(f => [f.u.id, f]));

  for (const pr of pronosticos){
    const p = partidos.find(x => x.id === pr.partido_id);
    const f = porUsuario[pr.usuario_id];
    if (!p || !f || p.estado !== "FINISHED") continue;
    
    const pts = puntosDe(pr, p);
    if (pts == null) continue;
    
    f.jugados++; 
    f.total += pts;
    
    if (pts === 5) f.plenos++; 
    else if (pts > 0) f.signos++;

    // Guardar estado anterior al último partido para la tendencia
    if (p.id !== idUltimo) {
        f.totalAnt += pts;
        if (pts === 5) f.plenosAnt++;
    } else {
        f.ptsUltimo = pts; // Puntos ganados en la última jornada
    }
  }

  // Ordenar el histórico para asignar Rank anterior
  const antSorted = [...filas].sort((a,b) => b.totalAnt - a.totalAnt || b.plenosAnt - a.plenosAnt || a.u.nombre.localeCompare(b.u.nombre));
  antSorted.forEach((f, idx) => f.rankAnt = idx + 1);

  // Ordenar el actual para asignar Rank definitivo y Tendencia
  const actSorted = filas.sort((a,b) => b.total - a.total || b.plenos - a.plenos || a.u.nombre.localeCompare(b.u.nombre));
  actSorted.forEach((f, idx) => {
      f.rank = idx + 1;
      f.tendencia = f.rankAnt - f.rank; // Positivo = sube puestos
  });

  return actSorted;
}

/* ---------- Vista: Partidos ---------- */
function empezado(p){ return p.fecha_utc && new Date(p.fecha_utc).getTime() <= Date.now(); }
function fmtHora(p){
  if (!p.fecha_utc) return "Por definir";
  return new Date(p.fecha_utc).toLocaleTimeString("es-ES", {hour:"2-digit", minute:"2-digit"});
}
function fmtDia(iso){
  const d = new Date(iso);
  const txt = d.toLocaleDateString("es-ES", {weekday:"long", day:"numeric", month:"long"});
  return txt.charAt(0).toUpperCase() + txt.slice(1);
}
function chipEstado(p){
  if (p.estado === "IN_PLAY" || p.estado === "PAUSED") return `<span class="chip vivo">En juego</span>`;
  if (p.estado === "FINISHED") return `<span class="chip fin">Final</span>`;
  return `<span class="chip">${fmtHora(p)}</span>`;
}
function escudo(url){
  return url ? `<img src="${esc(url)}" alt="" loading="lazy">` : `<div class="sin-escudo">❔</div>`;
}
function vistaPartidos(){
  if (partidos.length === 0){
    return `<div class="vacio">Todavía no hay partidos cargados.<br><br>
      ${me ? "Si eres el admin, entra en <b>Perfil → Panel de admin</b> y pulsa <b>Sincronizar ahora</b>." : "Inicia sesión en Perfil para empezar."}</div>`;
  }
  if (!me){
    return `<div class="vacio">Para pronosticar, primero crea tu perfil o inicia sesión en la pestaña <b>Perfil</b> 👤</div>` + listaPartidos(false);
  }
  return listaPartidos(true);
}
function listaPartidos(conPron){
  const porDia = {};
  for (const p of partidos){
    const clave = p.fecha_utc ? new Date(p.fecha_utc).toDateString() : "zzz";
    (porDia[clave] = porDia[clave] || []).push(p);
  }
  const claves = Object.keys(porDia).sort((a,b) =>
    (a==="zzz"?Infinity:new Date(a)) - (b==="zzz"?Infinity:new Date(b)));
  let html = "";
  for (const k of claves){
    html += `<div class="dia-titulo">${k==="zzz" ? "Fecha por definir" : esc(fmtDia(porDia[k][0].fecha_utc))}</div>`;
    for (const p of porDia[k]) html += tarjetaPartido(p, conPron);
  }
  return html;
}
function tarjetaPartido(p, conPron){
  const vivo = p.estado === "IN_PLAY" || p.estado === "PAUSED";
  const fin = p.estado === "FINISHED";
  const hayResultado = p.goles_local != null && p.goles_visitante != null && (vivo || fin);
  const etiqueta = (ETAPAS[p.etapa] || p.etapa) + (p.grupo ? ` · Grupo ${esc(p.grupo)}` : "");
  let centro;
  if (hayResultado){
    centro = `<div class="tanteo">${p.goles_local} – ${p.goles_visitante}<small>${fin ? "final" : "en juego"}</small></div>`;
  } else {
    centro = `<div class="tanteo"><span class="vs">VS</span><small>${p.fecha_utc ? fmtHora(p) : "—"}</small></div>`;
  }
  let bloquePron = "";
  if (conPron) bloquePron = zonaPronostico(p);
  return `<article class="partido ${vivo?"en-vivo":""} ${fin?"acabado":""}">
    <div class="partido-meta"><span>${etiqueta}</span>${chipEstado(p)}</div>
    <div class="marcador">
      <div class="equipo">${escudo(p.local_crest)}<span>${esc(p.local || "Por definir")}</span></div>
      ${centro}
      <div class="equipo">${escudo(p.visitante_crest)}<span>${esc(p.visitante || "Por definir")}</span></div>
    </div>
    ${bloquePron}
  </article>`;
}
function zonaPronostico(p){
  const mio = pronosticos.find(x => x.usuario_id === me.id && x.partido_id === p.id);
  if (!empezado(p)){
    if (!p.local || !p.visitante) return `<div class="candado">🔒 Se abrirá cuando se conozca el cruce</div>`;
    const d = borradores[p.id] || { gl: mio ? mio.goles_local : 0, gv: mio ? mio.goles_visitante : 0 };
    borradores[p.id] = d;
    return `<div class="pron">
      <div class="pron-titulo">Tu pronóstico ${mio ? "· guardado ✓" : ""}</div>
      <div class="pron-fila">
        ${stepper(p.id,"gl",d.gl)}
        <div style="text-align:center;color:var(--grada);font-size:12px">goles</div>
        ${stepper(p.id,"gv",d.gv)}
      </div>
      <button class="guardar" onclick="guardarPronostico(${p.id})">${mio ? "Actualizar pronóstico" : "Guardar pronóstico"}</button>
      <div id="msg-${p.id}"></div>
    </div>`;
  }

  const todos = pronosticos.filter(x => x.partido_id === p.id);
  if (todos.length === 0) return `<div class="candado">Nadie pronosticó este partido 😶</div>`;

  const vivo = p.estado === "IN_PLAY" || p.estado === "PAUSED";

  const chips = todos.map(pr => {
    const u = usuarios.find(x => x.id === pr.usuario_id);
    const pts = puntosDe(pr, p);
    
    let clsPick = "";
    let sufijo = "";
    
    if (vivo) {
      clsPick = pts > 0 ? "vivo-verde" : "vivo-rojo";
      sufijo = pts > 0 ? ` <span style="font-size:10px; opacity:0.8">virt. +${pts}</span>` : "";
    } else {
      let clsPts = "p0";
      if (pts === 5) clsPts = "p5";
      else if (pts === 4) clsPts = "p4";
      else if (pts === 3) clsPts = "p3";
      else if (pts === 1) clsPts = "p1";
      
      sufijo = pts == null ? "" : ` <span class="${clsPts}">${pts===5?"+5 🎯":pts>0?"+"+pts:"0"}</span>`;
    }

    return `<span class="pick ${clsPick}">${u ? esc(u.emoji+" "+u.nombre) : "?"} <b>${pr.goles_local}-${pr.goles_visitante}</b>${sufijo}</span>`;
  }).join("");

  return `<div class="picks">${chips}</div>`;
}

function stepper(id, campo, valor){
  return `<div class="stepper">
    <button type="button" aria-label="menos" onclick="ajustar(${id},'${campo}',-1)">−</button>
    <span class="num" id="num-${id}-${campo}">${valor}</span>
    <button type="button" aria-label="más" onclick="ajustar(${id},'${campo}',1)">+</button>
  </div>`;
}
function ajustar(id, campo, delta){
  const d = borradores[id]; if (!d) return;
  d[campo] = Math.max(0, Math.min(99, d[campo] + delta));
  $(`num-${id}-${campo}`).textContent = d[campo];
}
async function guardarPronostico(partidoId){
  const p = partidos.find(x => x.id === partidoId);
  if (!p || empezado(p)){ render(); return; }
  const d = borradores[partidoId];
  const msg = $(`msg-${partidoId}`);
  const { error } = await db.from("pronosticos").upsert(
    { usuario_id: me.id, partido_id: partidoId, goles_local: d.gl, goles_visitante: d.gv, actualizado_en: new Date().toISOString() },
    { onConflict: "usuario_id,partido_id" }
  );
  if (error){ msg.innerHTML = `<div class="error">No se pudo guardar: ${esc(error.message)}</div>`; return; }
  msg.innerHTML = `<div class="guardado-ok">Pronóstico guardado ✓</div>`;
  await cargarTodo();
  setTimeout(render, 600);
}

function vistaTorneo(){
  if (partidos.length === 0) return `<div class="vacio">Aún no hay datos del torneo.</div>`;
  let html = "";
  const grupos = {};
  for (const p of partidos.filter(x => x.etapa === "GROUP_STAGE" && x.grupo)){
    (grupos[p.grupo] = grupos[p.grupo] || []).push(p);
  }
  const letras = Object.keys(grupos).sort();
  if (letras.length){
    html += `<div class="dia-titulo">Fase de grupos</div>`;
    for (const g of letras) html += tablaGrupo(g, grupos[g]);
  }
  for (const etapa of ORDEN_ETAPAS.slice(1)){
    const ps = partidos.filter(x => x.etapa === etapa);
    if (!ps.length) continue;
    html += `<div class="dia-titulo">${ETAPAS[etapa]}</div>`;
    for (const p of ps) html += tarjetaPartido(p, false);
  }
  return html || `<div class="vacio">Aún no hay datos del torneo.</div>`;
}
function tablaGrupo(letra, ps){
  const t = {};
  const fila = (n, crest) => t[n] = t[n] || { n, crest, pj:0, pts:0, gf:0, gc:0 };
  for (const p of ps){
    if (p.local) fila(p.local, p.local_crest);
    if (p.visitante) fila(p.visitante, p.visitante_crest);
    if (p.estado !== "FINISHED" || p.goles_local == null) continue;
    const L = t[p.local], V = t[p.visitante];
    L.pj++; V.pj++; L.gf += p.goles_local; L.gc += p.goles_visitante; V.gf += p.goles_visitante; V.gc += p.goles_local;
    if (p.goles_local > p.goles_visitante) L.pts += 3;
    else if (p.goles_local < p.goles_visitante) V.pts += 3;
    else { L.pts++; V.pts++; }
  }
  const filas = Object.values(t).sort((a,b) => b.pts - a.pts || (b.gf-b.gc) - (a.gf-a.gc) || b.gf - a.gf || a.n.localeCompare(b.n));
  return `<div class="grupo-card"><h3>Grupo ${esc(letra)}</h3>
    <table><tr><th>Equipo</th><th>PJ</th><th>GF</th><th>GC</th><th>Pts</th></tr>
    ${filas.map(f => `<tr><td>${esc(f.n)}</td><td>${f.pj}</td><td>${f.gf}</td><td>${f.gc}</td><td><b>${f.pts}</b></td></tr>`).join("")}
    </table></div>`;
}

function vistaTabla(){
  const filas = clasificacion();
  if (!filas.length) return `<div class="vacio">Todavía no hay nadie en la porra. ¡Sé el primero en la pestaña Perfil!</div>`;
  
  const podio = filas.slice(0, 3);

  const pos1 = podio[0];
  const pos2 = podio[1];
  const pos3 = podio[2];

  let podioHtml = `<div class="podio-container">`;

    </div>`;

  if (pos1) podioHtml += `
    <div class="podio-item oro">
      <div class="medalla">🥇</div>
      <div class="podio-avatar">${esc(pos1.u.emoji)}</div>
      <div class="podio-nombre">${esc(pos1.u.nombre)}</div>
      <div class="podio-pts">${pos1.total}<small>pts</small></div>
    </div>`;

  if (pos3) podioHtml += `
    <div class="podio-item bronce">
      <div class="medalla">🥉</div>
      <div class="podio-avatar">${esc(pos3.u.emoji)}</div>
      <div class="podio-nombre">${esc(pos3.u.nombre)}</div>
      <div class="podio-pts">${pos3.total}<small>pts</small></div>
    </div>`;
  podioHtml += `</div>`;

  let listaHtml = `<div class="lista-ranking">`;
  listaHtml += resto.map(f => {
    let trendHtml = `<div class="rank-trend trend-eq">=</div>`;
    if (f.tendencia > 0) trendHtml = `<div class="rank-trend trend-up">▲ ${f.tendencia}</div>`;
    else if (f.tendencia < 0) trendHtml = `<div class="rank-trend trend-down">▼ ${Math.abs(f.tendencia)}</div>`;

    return `
    <div class="rank-card ${me && f.u.id === me.id ? 'yo' : ''}">
      <div class="rank-pos">
        <span class="rank-num">${f.rank}</span>
        ${trendHtml}
      </div>
      <div class="rank-avatar">${esc(f.u.emoji)}</div>
      <div class="rank-info">
        <div class="rank-nombre">${esc(f.u.nombre)}</div>
        <div class="rank-stats">
          <span>⭐ ${f.plenos}</span>
          <span>✅ ${f.signos}</span>
          <span>📝 ${f.jugados}</span>
        </div>
      </div>
      <div class="rank-pts-box ${f.ptsUltimo > 0 ? 'has-trend' : ''}">
        <div class="rank-pts-val">${f.total}</div>
        <div class="rank-pts-lbl">PTS</div>
        ${f.ptsUltimo > 0 ? `<div class="rank-pts-trend">+${f.ptsUltimo}</div>` : ''}
      </div>
    </div>`;
  }).join("");
  listaHtml += `</div>`;

  const hayDirecto = partidos.some(p => p.estado === "IN_PLAY" || p.estado === "PAUSED");

  return `
  ${hayDirecto ? `<div class="live-banner">🔴 Live — posiciones proyectadas con el partido en curso</div>` : ''}
  ${podioHtml}
  ${listaHtml}
  <p class="nota" style="text-align:center; line-height:1.8; margin-top:24px;">
    Pleno exacto: <b style="color:var(--trofeo)">5 pts</b> · Ganador+Goles: <b style="color:#b3e6c9">4 pts</b><br>
    Solo Ganador/Empate: <b style="color:var(--cesped)">3 pts</b>
  </p>`;
}

/* ---------- Vista: Perfil Completo ---------- */
function vistaPerfil(){
  if (!me) return vistaAcceso();
  
  const filas = clasificacion();
  const f = filas.find(x => x.u.id === me.id) || { total:0, plenos:0, signos:0, jugados:0, rank: '-' };
  const maxPts = filas.length ? filas[0].total : 0;
  const dist = maxPts - f.total;
  const txtDist = (dist === 0 && filas.length > 1) ? "¡Líder de la porra!" : (dist > 0 ? `🔥 a ${dist} pts del 1º` : "Empieza a sumar");

  // Eficiencia
  const misProns = pronosticos.filter(x => x.usuario_id === me.id);
  const partidosJugados = partidos.filter(p => p.estado === "FINISHED" && misProns.some(pr => pr.partido_id === p.id)).sort((a,b) => new Date(a.fecha_utc) - new Date(b.fecha_utc));
  let aciertosPuntuables = 0;
  partidosJugados.forEach(p => {
      const pr = misProns.find(x => x.partido_id === p.id);
      if (puntosDe(pr, p) > 0) aciertosPuntuables++;
  });
  const eficiencia = partidosJugados.length ? Math.round((aciertosPuntuables / partidosJugados.length) * 100) : 0;

  // Forma (últimos 5 partidos)
  const ultimos5 = partidosJugados.slice(-5);
  let htmlForma = '';
  for(let i=0; i<5; i++){
      if(ultimos5[i]) {
          const pts = puntosDe(misProns.find(x => x.partido_id === ultimos5[i].id), ultimos5[i]);
          htmlForma += `<div class="forma-box ${pts > 0 ? 'forma-verde' : 'forma-roja'}"></div>`;
      } else {
          htmlForma += `<div class="forma-box forma-vacia"></div>`;
      }
  }

  // Lista MIS PRONÓSTICOS
  const misPartidosId = misProns.map(x => x.partido_id);
  const misPartidos = partidos.filter(p => misPartidosId.includes(p.id)).sort((a,b) => new Date(b.fecha_utc) - new Date(a.fecha_utc));

  let htmlProns = misPartidos.map(p => {
      const pr = misProns.find(x => x.partido_id === p.id);
      const fin = p.estado === "FINISHED";
      const vivo = p.estado === "IN_PLAY" || p.estado === "PAUSED";
      const pts = (fin || vivo) ? puntosDe(pr, p) : null;
      
      let badgePts = "";
      let realScore = "";

      if (fin) {
          badgePts = `<div class="pron-item-pts ${pts>0?'ok':''}">${pts}</div>`;
          realScore = `<span style="font-weight:400;color:var(--grada)">real</span> <b style="color:var(--trofeo)">${p.goles_local}-${p.goles_visitante}</b>`;
      } else if (vivo) {
          badgePts = `<div class="pron-item-pts vivo">Live ${pts>0?'+'+pts:''}</div>`;
          realScore = `<span style="font-weight:400;color:var(--grada)">real</span> <b style="color:var(--tarjeta-roja)">${p.goles_local}-${p.goles_visitante}</b>`;
      } else {
          badgePts = `<div class="pron-item-pts pending">-</div>`;
      }

      return `
      <div class="pron-item">
          <div class="pron-item-eq">
             ${escudo(p.local_crest)} <span style="font-size:8.5px;color:var(--cal-tenue)">vs</span> ${escudo(p.visitante_crest)}
          </div>
          <div class="pron-item-info">
              <div class="pron-item-nombres">${esc(p.local || "?")} · ${esc(p.visitante || "?")}</div>
              <div class="pron-item-scores"><span style="font-weight:400;color:var(--grada)">pred</span> <b style="color:var(--cal)">${pr.goles_local}-${pr.goles_visitante}</b> &nbsp;&nbsp; ${realScore}</div>
          </div>
          ${badgePts}
      </div>`;
  }).join("");

  return `
  <div class="perfil-header">
      <div class="perfil-avatar">${esc(me.emoji)}</div>
      <h2>${esc(me.nombre)}</h2>
      <div class="perfil-badges">
          <span class="badge badge-pos">🏅 #${f.rank}</span>
          <span class="badge badge-jugados">⚽ ${misProns.length}/104</span>
          ${f.rank <= 3 && filas.length > 3 ? '<span class="badge badge-podio">🏆 PODIO</span>' : ''}
      </div>
  </div>

  <div class="perfil-stats-row">
      <div class="p-stat-card"><div class="v">${f.total}</div><div class="k">PUNTOS</div></div>
      <div class="p-stat-card"><div class="v" style="color:var(--trofeo)">⭐ ${f.plenos}</div><div class="k">EXACTOS</div></div>
      <div class="p-stat-card"><div class="v" style="color:var(--cesped)">✅ ${f.signos}</div><div class="k">CORRECTOS</div></div>
  </div>

  <div class="perfil-dash-row">
      <div class="p-dash-card efi-card">
          <div class="efi-circle"><span>${eficiencia}%</span></div>
          <div class="k">EFICIENCIA</div>
      </div>
      <div class="p-dash-card">
          <div class="k" style="text-align:left; margin-bottom:8px; color:var(--grada)">FORMA</div>
          <div class="forma-row">${htmlForma}</div>
          <div class="forma-txt">${txtDist}</div>
      </div>
  </div>

  <h3 class="seccion-titulo">MIS PRONÓSTICOS</h3>
  <div class="pron-list">
      ${htmlProns || '<div class="vacio" style="padding:20px; background:var(--campo-2); border-radius:12px;">No has pronosticado ningún partido.</div>'}
  </div>

  <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn secundario" style="margin-top:0" onclick="cerrarSesion()">Cerrar sesión</button>
      <button class="btn secundario" style="margin-top:0" onclick="cambiarPorra()">↔️ Cambiar porra</button>
  </div>

  ${adminPin ? vistaAdmin() : `
  <div class="panel">
    <h2>🛠️ Panel de admin</h2>
    <p>Solo para quien organiza la porra.</p>
    <label for="pin-admin">PIN de admin</label>
    <input type="password" id="pin-admin" inputmode="numeric" autocomplete="off">
    <button class="btn oro" onclick="entrarAdmin()">Entrar como admin</button>
    <div id="msg-admin"></div>
  </div>`}
  `;
}

function vistaAcceso(){
  return `
  <div class="panel">
    <h2>Inicia sesión</h2>
    <p>Estás en <b style="color:var(--trofeo)">${esc(porra.nombre)}</b>. Elige tu nombre y mete tu PIN.
       <a href="#" onclick="cambiarPorra();return false" style="color:var(--grada)">¿No es tu porra?</a></p>
    <label for="sel-usuario">¿Quién eres?</label>
    <select id="sel-usuario">${usuarios.map(u => `<option value="${u.id}">${esc(u.emoji)} ${esc(u.nombre)}</option>`).join("")}</select>
    <label for="pin-login">Tu PIN</label>
    <input type="password" id="pin-login" inputmode="numeric" autocomplete="off">
    <button class="btn" onclick="iniciarSesion()">Entrar</button>
    <div id="msg-login"></div>
  </div>
  <div class="panel">
    <h2>¿Primera vez? Únete</h2>
    <p>Crea tu perfil en 10 segundos. El PIN es para que nadie toque tus pronósticos.</p>
    <label for="reg-nombre">Tu nombre o apodo</label>
    <input type="text" id="reg-nombre" maxlength="20" autocomplete="off">
    <label for="reg-pin">Elige un PIN (4 a 6 números)</label>
    <input type="password" id="reg-pin" inputmode="numeric" autocomplete="off">
    <label>Tu emoji</label>
    <div class="emoji-fila" id="emoji-fila">
      ${EMOJIS.map((e,i) => `<button type="button" class="${i===0?"activo":""}" onclick="elegirEmoji(this,'${e}')">${e}</button>`).join("")}
    </div>
    <button class="btn oro" onclick="registrarse()">Crear mi perfil</button>
    <div id="msg-reg"></div>
    <p class="nota">Esta porra es entre amigos: el PIN evita despistes, no es una caja fuerte. No uses una contraseña que utilices en otros sitios.</p>
  </div>`;
}
let emojiElegido = EMOJIS[0];
function elegirEmoji(btn, e){
  emojiElegido = e;
  document.querySelectorAll("#emoji-fila button").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");
}
async function registrarse(){
  const nombre = $("reg-nombre").value.trim();
  const pin = $("reg-pin").value.trim();
  const msg = $("msg-reg");
  if (nombre.length < 2) return msg.innerHTML = `<div class="error">Pon un nombre de al menos 2 letras.</div>`;
  if (!/^\d{4,6}$/.test(pin)) return msg.innerHTML = `<div class="error">El PIN deben ser de 4 a 6 números.</div>`;
  const hash = await sha256(nombre.toLowerCase() + ":" + pin);
  const { data, error } = await db.from("usuarios")
    .insert({ porra_id: porra.id, nombre, pin_hash: hash, emoji: emojiElegido }).select().single();
  if (error){
    const txt = error.code === "23505" ? "Ese nombre ya está cogido en esta porra." : error.message;
    return msg.innerHTML = `<div class="error">${esc(txt)}</div>`;
  }
  me = { id: data.id, nombre: data.nombre, emoji: data.emoji };
  localStorage.setItem("porra_usuario", JSON.stringify(me));
  await cargarTodo(); irA("partidos");
}
async function iniciarSesion(){
  const id = $("sel-usuario")?.value;
  const pin = $("pin-login").value.trim();
  const msg = $("msg-login");
  if (!id) return msg.innerHTML = `<div class="error">Aún no hay nadie registrado: crea tu perfil abajo.</div>`;
  const { data: u } = await db.from("usuarios").select("*").eq("id", id).single();
  if (!u) return msg.innerHTML = `<div class="error">Usuario no encontrado.</div>`;
  const hash = await sha256(u.nombre.toLowerCase() + ":" + pin);
  if (hash !== u.pin_hash) return msg.innerHTML = `<div class="error">PIN incorrecto.</div>`;
  me = { id: u.id, nombre: u.nombre, emoji: u.emoji };
  localStorage.setItem("porra_usuario", JSON.stringify(me));
  irA("partidos");
}
function cerrarSesion(){
  me = null; localStorage.removeItem("porra_usuario");
  adminPin = null; sessionStorage.removeItem("adminPin");
  render();  
}

/* ---------- Admin ---------- */
async function entrarAdmin(){
  const pin = $("pin-admin").value.trim();
  const { data, error } = await db.rpc("es_admin_pin", { p_porra: porra.id, pin });
  if (error || !data){
    $("msg-admin").innerHTML = `<div class="error">PIN de admin incorrecto para esta porra.</div>`; return;
  }
  adminPin = pin; sessionStorage.setItem("adminPin", pin); render();
}
function vistaAdmin(){
  const pendientes = partidos.filter(p => empezado(p) && p.estado !== "FINISHED");
  const recientes = partidos.filter(p => p.estado === "FINISHED").slice(-5).reverse();
  return `
  <div class="panel">
    <h2>🛠️ Panel de admin</h2>
    <p>Los resultados llegan solos desde football-data.org. Aquí puedes forzar una sincronización o corregir a mano. Ojo: los resultados reales son compartidos, así que corregirlos afecta a todas las porras.</p>
    <button class="btn" onclick="sincronizarAhora()">🔄 Sincronizar ahora</button>
    <div id="msg-sync"></div>

    <label style="margin-top:20px">Poner resultado a mano</label>
    ${pendientes.length === 0 ? `<p class="nota">No hay partidos en juego o pendientes de cerrar ahora mismo.</p>` :
      pendientes.map(filaAdmin).join("")}
    ${recientes.length ? `<label style="margin-top:18px">Corregir un resultado reciente</label>` + recientes.map(filaAdmin).join("") : ""}

    <label style="margin-top:20px">Añadir partido a mano (respaldo)</label>
    <input type="text" id="np-local" placeholder="Equipo local" style="margin-bottom:8px">
    <input type="text" id="np-visit" placeholder="Equipo visitante" style="margin-bottom:8px">
    <input type="datetime-local" id="np-fecha">
    <button class="btn secundario" onclick="crearPartidoManual()">Añadir partido</button>
    <div id="msg-nuevo"></div>

    <label style="margin-top:20px">👥 Gestión de Participantes</label>
    <p class="nota">Selecciona un jugador para asignarle puntos extra o resetear su PIN al valor temporal <b>0000</b>.</p>
    <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px">
      <select id="adm-puntos-usr" style="width:100%; padding:12px; font-size:14px; border-radius:12px; border:1px solid var(--cal-tenue); background:var(--campo); color:var(--cal);">
        ${usuarios.map(u => `<option value="${u.id}">${esc(u.emoji)} ${esc(u.nombre)} (${u.puntos_extra || 0} extra)</option>`).join("")}
      </select>
      <div style="display:flex; gap:8px;">
        <input type="number" id="adm-puntos-val" placeholder="+/- pts" style="flex:1; text-align:center; padding:12px; font-size:14px; border-radius:12px; border:1px solid var(--cal-tenue); background:var(--campo); color:var(--cal);">
        <button class="btn oro" style="margin-top:0; width:auto; padding:12px 16px;" onclick="darPuntos()">Asignar</button>
      </div>
      <button class="btn secundario" style="margin-top:4px;" onclick="resetearPin()">🔒 Resetear PIN a "0000"</button>
    </div>
    <div id="msg-admin-gestion"></div>

    <button class="btn peligro" onclick="salirAdmin()">Salir del modo admin</button>
  </div>`;
}
function filaAdmin(p){
  return `<div class="admin-partido">
    <span style="flex:1">${esc(p.local||"?")} – ${esc(p.visitante||"?")}</span>
    <span class="mini">
      <input type="text" inputmode="numeric" id="adm-gl-${p.id}" value="${p.goles_local ?? ""}" placeholder="0">
      <input type="text" inputmode="numeric" id="adm-gv-${p.id}" value="${p.goles_visitante ?? ""}" placeholder="0">
      <button class="btn-mini" onclick="guardarResultado(${p.id})">Final ✓</button>
    </span>
  </div>`;
}
async function guardarResultado(id){
  const gl = parseInt($(`adm-gl-${id}`).value, 10);
  const gv = parseInt($(`adm-gv-${id}`).value, 10);
  if (isNaN(gl) || isNaN(gv)) return alert("Pon los dos marcadores.");
  const { error } = await db.rpc("set_resultado", { p_id: id, gl, gv, p_estado: "FINISHED", p_porra: porra.id, pin: adminPin });
  if (error) return alert("Error: " + error.message);
  await cargarTodo(); render();
}
async function crearPartidoManual(){
  const local = $("np-local").value.trim(), visit = $("np-visit").value.trim(), fecha = $("np-fecha").value;
  const msg = $("msg-nuevo");
  if (!local || !visit || !fecha) return msg.innerHTML = `<div class="error">Rellena equipos y fecha.</div>`;
  const { error } = await db.rpc("crear_partido", {
    p_local: local, p_visitante: visit, p_fecha: new Date(fecha).toISOString(),
    p_etapa: "GROUP_STAGE", p_grupo: null, p_porra: porra.id, pin: adminPin
  });
  if (error) return msg.innerHTML = `<div class="error">${esc(error.message)}</div>`;
  msg.innerHTML = `<div class="ok">Partido añadido ✓</div>`;
  await cargarTodo(); setTimeout(render, 700);
}
async function sincronizarAhora(){
  $("msg-sync").innerHTML = `<div class="nota">Sincronizando…</div>`;
  const r = await llamarSync(true);
  if (!r.ok) $("msg-sync").innerHTML = `<div class="error">${esc(r.error || "Error desconocido")}</div>`;
  else if (r.omitido) $("msg-sync").innerHTML = `<div class="ok">${esc(r.mensaje)}</div>`;
  else $("msg-sync").innerHTML = `<div class="ok">Sincronizados ${r.partidos} partidos ✓</div>`;
  await cargarTodo(); setTimeout(render, 900);
}
function salirAdmin(){ adminPin = null; sessionStorage.removeItem("adminPin"); render(); }
async function darPuntos(){
  const uid = $("adm-puntos-usr").value;
  const pts = parseInt($("adm-puntos-val").value, 10);
  const msg = $("msg-admin-gestion");
  if (!uid || isNaN(pts)) return msg.innerHTML = `<div class="error">Selecciona un usuario y escribe los puntos.</div>`;

  msg.innerHTML = `<div class="nota">Procesando puntos…</div>`;
  const { error } = await db.rpc("asignar_puntos_extra", {
    p_usuario: uid, p_puntos: pts, p_porra: porra.id, pin: adminPin
  });

  if (error) return msg.innerHTML = `<div class="error">${esc(error.message)}</div>`;
  msg.innerHTML = `<div class="ok">Puntos asignados con éxito ✓</div>`;
  $("adm-puntos-val").value = "";
  await cargarTodo();
  setTimeout(render, 800);
}

async function resetearPin(){
  const uid = $("adm-puntos-usr").value;
  const msg = $("msg-admin-gestion");
  if (!uid) return;

  const u = usuarios.find(x => x.id === uid);
  if (!u) return;

  if (!confirm(`¿Seguro que quieres cambiar el PIN de ${u.nombre} a "0000"?`)) return;

  msg.innerHTML = `<div class="nota">Generando nueva clave segura…</div>`;
  const nuevoHash = await sha256(u.nombre.toLowerCase() + ":0000");

  const { error } = await db.rpc("resetear_pin_admin", {
    p_usuario: uid, p_nuevo_hash: nuevoHash, p_porra: porra.id, pin: adminPin
  });

  if (error) return msg.innerHTML = `<div class="error">${esc(error.message)}</div>`;
  msg.innerHTML = `<div class="ok">¡PIN de ${esc(u.nombre)} reseteado a "0000" con éxito! ✓</div>`;
  await cargarTodo();
  setTimeout(render, 1500);
}
</script>
</body>
</html>
